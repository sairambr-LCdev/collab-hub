<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CollabHub | Projects Dashboard</title>
  </head>
  <body>
    <div class="app-container" id="app">
      
      <!-- Zoho-Style Left Sidebar -->
      <nav class="sidebar" aria-label="Main Navigation">
        <div class="sidebar-header">
          CollabHub 🚀
        </div>
        <div class="nav-section">
          <div class="nav-heading">Portfolios</div>
          <div id="project-list">
            <!-- Rendered by JS -->
          </div>
        </div>
      </nav>

      <main class="main-content">
        <!-- Zoho-Style Top Nav Band -->
        <header class="top-nav">
          <div class="project-tabs">
            <div class="tab active">Dashboard</div>
            <div class="tab">Tasks</div>
            <div class="tab">Milestones</div>
          </div>
          <div class="user-profile">
            <span id="user-avatar">👤</span>
            <span id="user-name" style="font-weight: 600; font-size: 0.875rem;">Admin</span>
          </div>
        </header>

        <!-- Widget-Based Dashboard Area -->
        <div class="dashboard-wrapper">
          <div class="dashboard-header">
            <h1 id="current-project-title" style="font-size: 1.5rem; color: var(--text-primary);">Project Dashboard</h1>
            <button id="add-task-btn" class="primary">+ New Task</button>
          </div>

          <div class="dashboard-grid">
            
            <!-- Widget 1: Task Status Overview -->
            <div class="widget">
              <div class="widget-header">
                <span>Project Health</span>
              </div>
              <div class="widget-content">
                <div class="stats-container" id="project-stats">
                  <!-- Rendered by JS -->
                </div>
              </div>
            </div>

            <!-- Widget 2: Recent Tasks (Spans 2 columns) -->
            <div class="widget widget-span-2">
              <div class="widget-header">
                <span>Active Tasks</span>
              </div>
              <div class="widget-content">
                <div id="task-list" class="task-list">
                  <!-- Rendered by JS -->
                </div>
              </div>
            </div>

            <!-- Widget 3: CollabBot Contextual Chat -->
            <div class="widget widget-span-2">
              <div class="widget-header">
                <span>Team Feed & CollabBot</span>
              </div>
              <div class="widget-content" style="display: flex; flex-direction: column;">
                <div id="chat-messages" class="chat-messages">
                  <!-- Rendered by JS -->
                </div>
                <form id="chat-form" class="chat-input-area">
                  <input type="text" id="chat-input" placeholder="Discuss work or ask @bot for stats..." autocomplete="off" />
                  <button type="submit" class="primary">Send</button>
                </form>
              </div>
            </div>

            <!-- Widget 4: Quick Links / Details -->
            <div class="widget">
              <div class="widget-header">
                <span>Project Details</span>
              </div>
              <div class="widget-content">
                <p style="color: var(--text-secondary); font-size: 0.875rem; line-height: 1.5;">
                  This project workspace is monitored by CollabBot. All tasks and events are automatically tracked in real-time.
                </p>
              </div>
            </div>

          </div>
        </div>

      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
